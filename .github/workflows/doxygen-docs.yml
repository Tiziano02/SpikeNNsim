name: Deploy Doxygen docs to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy concorrenti, ma lascia finire quello in corso
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (incluso il submodule doxygen-awesome-css)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Installa Doxygen e Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Genera la documentazione
        run: doxygen Doxyfile

      - name: Prepara Pages
        uses: actions/configure-pages@v5

      - name: Carica l'artifact della documentazione
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
